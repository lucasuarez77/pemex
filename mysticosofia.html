<!DOCTYPE html>
<html>
<head>
  <title>Mysticosofia</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    /* Background grid layer */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 120px);
      grid-auto-rows: 120px;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .tile {
      background-size: cover;
      background-position: center;
    }

    /* Text overlay layer */
    .overlay {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .overlay h1 {
      font-size: 600%;
      color: pink;
      margin: 0;
    }

    .overlay a {
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="grid" id="grid"></div>

  <div class="overlay">
    <a href="./nutrients">
      <h1>CIA-RDP96-007-89R001001420001-3</h1>
    </a>
  </div>

  <script>
    const grid = document.getElementById("grid");
    const tileSize = 120;

    const rows = Math.ceil(window.innerHeight / tileSize);
    const cols = Math.ceil(window.innerWidth / tileSize);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const tile = document.createElement("div");
        tile.classList.add("tile");

        if ((r + c) % 2 === 0) {
          tile.style.backgroundImage = "url('chronicler.gif')";
        } else {
          tile.style.backgroundImage = "url('grinberg.gif')";
        }

        grid.appendChild(tile);
      }
    }
  </script>

</body>
</html>
