<!DOCTYPE html>
<html>
<head>
  <title>Mysticosofia</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .grid-wrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      grid-auto-rows: 120px;
      z-index: 0;
    }

    .tile {
      width: 120px;
      height: 120px;
      background-size: cover;
      background-position: center;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
      text-align: center;
    }

    .overlay h1 {
      font-size: 600%;
      color: pink;
      margin: 0;
    }

    .overlay a {
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="grid-wrapper" id="grid"></div>

  <div class="overlay">
    <a href="./nutrients">
      <h1>CIA-RDP96-007-89R001001420001-3</h1>
    </a>
  </div>

  <script>
    const grid = document.getElementById("grid");
    const tileSize = 120;

    function buildGrid() {
      // Clear previous tiles
      grid.innerHTML = "";

      // Calculate how many tiles are needed
      const cols = Math.ceil(window.innerWidth / tileSize) + 4;
      const rows = Math.ceil(window.innerHeight / tileSize) + 4;

      // Lock exact column count (NO auto-fill)
      grid.style.gridTemplateColumns = `repeat(${cols}, ${tileSize}px)`;

      // Set exact grid width/height
      grid.style.width = cols * tileSize + "px";
      grid.style.height = rows * tileSize + "px";

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const tile = document.createElement("div");
          tile.classList.add("tile");

          if ((r + c) % 2 === 0) {
            tile.style.backgroundImage = "url('chronicler.gif')";
          } else {
            tile.style.backgroundImage = "url('grinberg.gif')";
          }

          grid.appendChild(tile);
        }
      }
    }

    // Build on load
    buildGrid();

    // Rebuild cleanly on resize
    window.addEventListener("resize", buildGrid);
  </script>

</body>
</html>
